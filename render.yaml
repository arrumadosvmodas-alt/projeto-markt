services:
  - type: web
    name: markt-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://projeto-markt-production.up.railway.app/*
      - type: rewrite
        source: /*
        destination: /index.html